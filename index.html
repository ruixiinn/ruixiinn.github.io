<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            max-height: 100vh;
        }
        img {
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            height: 100%;
            object-fit: cover;
            padding: 0px;
            position: absolute;
            width: 100%;
        }
        .nav {
            height: 26vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #S {
            height: 2.6vmax;
            width: 33vmax;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.466);
            border: none;
            border-radius: 2.5vmin;
            padding-left: 2vmin;
            font-size: 1.8vmin;
            color: rgba(0, 0, 0, 0.938);
            outline: none;
        }
        input[type=search]::-webkit-search-cancel-button {
            -webkit-appearance: none;
        }     
    </style>
    <script>
        function sFunction() {
            var s = document.getElementById("S").value;
            if (s=="") {
             alert("请输入搜索内容");
            } else {
                window.location.href = "https://www.baidu.com/s?ie=utf-8&f=8&rsv_bp=1&rsv_idx=1&tn=baidu&wd=" + S.value;
            }
        }      
    </script>
</head>
<body>
    <img src="https://www.bing.com/th?id=OHR.SaltDesert_EN-US2123050087_UHD.jpg" alt="微软每日壁纸">
    <div class="nav">
        <form action="" style="z-index: 10;">
            <input type="search" id="S" autocomplete="off" onsearch="sFunction()"  />
        </form>
    </div>
    </div>
</body>
</html>

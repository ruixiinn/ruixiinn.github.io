<!DOCTYPE html>
<html lang=zh dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>index</title>
  </head>
  <style media="screen">
    body{
      padding:0;margin:0;
    }
    .top{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    p{
      padding: 2vmax 5vmax;
      border-radius: 10px;
      transition: 1s;
      text-align: center;
      font-size: 4vw;
    }
    p:hover{
      background-color: black;
      color: white;
    }
    .main{
      justify-content: center;
      background-color: black;
      margin: 0;
    }
    h1{
      margin: 0;
      color: white;
      padding: 3vh;
      text-align: center;
    }
  </style>

  <body>
    <div class="top">
          <p>Ruixiinn</p>
    </div>
    <div class="main">
      <h1>This is test page!</h1>
    </div>

  </body>
</html>
